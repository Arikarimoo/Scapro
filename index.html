<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scania Service Pro</title>

<link rel="icon" href="Icon.jpg" sizes="192x192">
<link rel="apple-touch-icon" href="Icon.jpg">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
    :root {
        --bg-main: #000000;
        --bg-card: #1c1c1e;
        --scania-red: #ff3b30;
        --text-main: #ffffff;
        --text-sec: #8e8e93;
        --border-color: #38383a;
        --success: #34c759;
        --nav-bg: rgba(28, 28, 30, 0.9);
    }

    body.light-mode {
        --bg-main: #f2f2f7;
        --bg-card: #ffffff;
        --scania-red: #d6001c;
        --text-main: #000000;
        --text-sec: #6e6e73;
        --border-color: #c6c6c8;
        --nav-bg: rgba(255, 255, 255, 0.9);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0; background-color: var(--bg-main); color: var(--text-main);
        padding-bottom: 90px; transition: 0.3s;
        padding-top: env(safe-area-inset-top);
    }

    header {
        padding: 20px 15px 10px; background: var(--bg-main); position: sticky;
        top: 0; z-index: 10; border-bottom: 1px solid var(--border-color);
        display: flex; justify-content: space-between; align-items: center;
        padding-top: calc(10px + env(safe-area-inset-top));
    }

    h1 { margin: 0; font-size: 24px; font-weight: 700; }
    h1 span { color: var(--scania-red); }
    .subtitle { color: var(--text-sec); font-size: 12px; text-transform: uppercase; }

    .theme-toggle {
        background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main);
        border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer;
    }

    .form-group {
        background: var(--bg-card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border-color);
    }

    label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; font-weight: 600; }

    input, textarea {
        width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-color);
        color: var(--text-main); font-size: 16px; padding: 10px 0; margin-bottom: 15px;
    }
    
    input[type="date"] { color: var(--scania-red); font-weight: bold; }
    input:focus, textarea:focus { outline: none; border-bottom-color: var(--scania-red); }

    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-primary { background-color: var(--scania-red); color: white; }
    .btn-share { background-color: #5e5ce6; color: white; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;}

    .section-title { padding: 10px 15px 5px; font-size: 18px; font-weight: 600; }
    
    .list-card {
        background: var(--bg-card); margin: 0 15px 12px; border-radius: 12px; padding: 16px; border: 1px solid var(--border-color);
        display: flex; flex-direction: column; gap: 8px;
    }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .reg-plate { font-size: 18px; font-weight: 700; }
    .date-badge { background: rgba(120,120,128,0.15); padding: 4px 8px; border-radius: 6px; font-size: 12px; color: var(--scania-red); font-weight: bold;}
    
    .problem-desc { font-size: 14px; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px;}

    .btn-done { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 6px 12px; border-radius: 15px; font-size: 12px; align-self: flex-end;}

    .tab-bar {
        position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(20px);
        border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    }

    .tab-item { color: var(--text-sec); background: none; border: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tab-item.active { color: var(--scania-red); }

    .view { display: none; }
    .view.active { display: block; }

    #notify-banner { background: var(--scania-red); color: white; padding: 10px; font-size: 12px; text-align: center; display: none; cursor: pointer; }
</style>
</head>
<body>

<div id="notify-banner" onclick="requestNotifyPermission()">
   🔔 КЛИКНИ ТУКА ЗА ДА ВКЛУЧИШ НОТИФИКАЦИИ
</div>

<header>
    <div>
        <h1>SCANIA <span>PRO</span></h1>
        <div class="subtitle">Stajkovci Sync</div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
</header>

<div id="view-vehicles" class="view active">
    <div class="form-group">
        <label>Датум</label>
        <input type="date" id="bookingDate">
        <label>Клиент</label>
        <input type="text" id="clientInput" placeholder="Име на клиент">
        <label>Регистрација</label>
        <input type="text" id="regInput" placeholder="SK-0000-AA" style="text-transform: uppercase;">
        <label>Проблем</label>
        <textarea id="problemInput" placeholder="Опис..."></textarea>
        <button class="btn btn-primary" onclick="addVehicle()">Внеси во систем</button>
    </div>
    <div class="section-title">Активни возила</div>
    <div id="vehicleList"></div>
</div>

<div id="view-tasks" class="view">
    <div class="form-group">
        <label>Нова задача</label>
        <input type="text" id="taskInput" placeholder="Што треба да се заврши?">
        <button class="btn btn-primary" onclick="addTask()">Додади задача</button>
    </div>
    <div class="section-title">Задачи</div>
    <div id="taskList"></div>
</div>

<div id="view-export" class="view">
    <div class="form-group">
        <label>Избери датум</label>
        <input type="date" id="exportDate">
        <button class="btn btn-share" onclick="shareToViber()">📱 Сподели на Viber</button>
    </div>
    <div id="exportList"></div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="switchView('vehicles')">🚛<br>Возила</button>
    <button class="tab-item" onclick="switchView('tasks')">📋<br>Задачи</button>
    <button class="tab-item" onclick="switchView('export')">📤<br>Сподели</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIGd6wcTm6_Jjz1pDeI7KNyeF_vSqIMk0",
        authDomain: "scaniapro-e6fdf.firebaseapp.com",
        projectId: "scaniapro-e6fdf",
        storageBucket: "scaniapro-e6fdf.firebasestorage.app",
        messagingSenderId: "844311721409",
        appId: "1:844311721409:web:8288d3b0a7dc88d79eab40"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let vehicles = [];
    let tasks = [];
    let isFirstLoad = true;

    // Нотификации
    if ("Notification" in window && Notification.permission === "default") {
        document.getElementById('notify-banner').style.display = 'block';
    }

    window.requestNotifyPermission = function() {
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                document.getElementById('notify-banner').style.display = 'none';
                new Notification("Scania Pro", { body: "Нотификациите се вклучени!" });
            }
        });
    };

    function sendPush(t, b) { if (Notification.permission === "granted") new Notification(t, { body: b }); }

    // Firebase Listeners
    onSnapshot(collection(db, "vehicles"), (snap) => {
        snap.docChanges().forEach(change => {
            if (!isFirstLoad && change.type === "added") sendPush("Ново возило!", change.doc.data().reg);
        });
        vehicles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        isFirstLoad = false;
        renderVehicles();
    });

    onSnapshot(collection(db, "tasks"), (snap) => {
        tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTasks();
    });

    // Функции
    window.addVehicle = async () => {
        const date = document.getElementById('bookingDate').value;
        const client = document.getElementById('clientInput').value;
        const reg = document.getElementById('regInput').value.toUpperCase();
        const problem = document.getElementById('problemInput').value;
        if(date && client && reg) await addDoc(collection(db, "vehicles"), { date, client, reg, problem, ts: Date.now() });
        document.getElementById('clientInput').value = ''; document.getElementById('regInput').value = ''; document.getElementById('problemInput').value = '';
    };

    window.removeVehicle = async (id) => { if(confirm("Завршено?")) await deleteDoc(doc(db, "vehicles", id)); };

    window.addTask = async () => {
        const text = document.getElementById('taskInput').value;
        if(text) await addDoc(collection(db, "tasks"), { text, done: false, ts: Date.now() });
        document.getElementById('taskInput').value = '';
    };

    window.toggleTask = async (id, s) => await updateDoc(doc(db, "tasks", id), { done: !s });
    window.deleteTask = async (id) => await deleteDoc(doc(db, "tasks", id));

    function renderVehicles() {
        const list = document.getElementById('vehicleList');
        list.innerHTML = '';
        vehicles.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(v => {
            const d = v.date.split('-');
            list.innerHTML += `<div class="list-card">
                <div class="card-header"><div><strong>${v.reg}</strong><br><small>${v.client}</small></div><div class="date-badge">${d[2]}.${d[1]}</div></div>
                <div class="problem-desc">${v.problem}</div>
                <button class="btn-done" onclick="removeVehicle('${v.id}')">✓ ГОТОВО</button>
            </div>`;
        });
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasks.sort((a,b) => a.ts - b.ts).forEach(t => {
            list.innerHTML += `<div class="list-card" style="flex-direction:row; opacity:${t.done?0.5:1}">
                <div style="flex:1; text-decoration:${t.done?'line-through':'none'}" onclick="toggleTask('${t.id}', ${t.done})">${t.text}</div>
                <button style="border:none; background:none; color:red" onclick="deleteTask('${t.id}')">✕</button>
            </div>`;
        });
    }

    window.switchView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    window.shareToViber = () => {
        const selDate = document.getElementById('exportDate').value;
        const filtered = vehicles.filter(v => v.date === selDate);
        if(filtered.length === 0) return alert("Нема возила за овој датум.");
        let txt = `*ПЛАН SCANIA*\n`;
        filtered.forEach(v => txt += `🚛 *${v.reg}* - ${v.client}\n🔧 ${v.problem}\n\n`);
        if(navigator.share) navigator.share({ text: txt });
        else { navigator.clipboard.writeText(txt); alert("Копирано!"); }
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const isL = document.body.classList.contains('light-mode');
        document.getElementById('themeBtn').innerText = isL ? '🌙' : '☀️';
    };

    document.getElementById('bookingDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('exportDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
