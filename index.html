<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scania Service Pro</title>

    <link rel="icon" href="Icon.jpg">
    <link rel="apple-touch-icon" href="Icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ScaniaPro">

    <style>
        :root {
            --bg-main: #000000;
            --bg-card: #1c1c1e;
            --scania-red: #ff3b30;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --border-color: #38383a;
            --success: #34c759;
            --nav-bg: rgba(28, 28, 30, 0.9);
        }

        body.light-mode {
            --bg-main: #f2f2f7;
            --bg-card: #ffffff;
            --scania-red: #d6001c;
            --text-main: #000000;
            --text-sec: #6e6e73;
            --border-color: #c6c6c8;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background-color: var(--bg-main); color: var(--text-main);
            padding-bottom: 100px; transition: 0.3s;
            padding-top: env(safe-area-inset-top);
        }

        header {
            padding: 20px 15px 10px; background: var(--bg-main); position: sticky;
            top: 0; z-index: 10; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }

        h1 { margin: 0; font-size: 24px; font-weight: 700; }
        h1 span { color: var(--scania-red); }

        .header-actions { display: flex; gap: 12px; align-items: center; }
        .icon-btn {
            background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main);
            border-radius: 50%; width: 42px; height: 42px; font-size: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }

        .form-group {
            background: var(--bg-card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border-color);
        }

        label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; font-weight: 700; }

        input, textarea {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-color);
            color: var(--text-main); font-size: 16px; padding: 10px 0; margin-bottom: 15px;
        }
        
        input:focus, textarea:focus { outline: none; border-bottom-color: var(--scania-red); }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-primary { background-color: var(--scania-red); color: white; }

        .list-card {
            background: var(--bg-card); margin: 0 15px 12px; border-radius: 12px; padding: 16px; border: 1px solid var(--border-color);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .reg-plate { font-size: 18px; font-weight: 800; }
        .date-badge { color: var(--scania-red); font-weight: 700; font-size: 13px; }
        
        .problem-desc { font-size: 14px; background: rgba(120,120,128,0.1); padding: 10px; border-radius: 8px; margin-top: 8px; line-height: 1.4; }

        .btn-done { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 6px 12px; border-radius: 15px; font-size: 12px; float: right; margin-top: 10px; font-weight: 600; }

        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px 0 30px;
        }

        .tab-item { color: var(--text-sec); background: none; border: none; font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-item.active { color: var(--scania-red); }

        .view { display: none; }
        .view.active { display: block; }

        #notify-btn { display: none; border: 1px solid var(--scania-red); color: var(--scania-red); }
    </style>
</head>
<body>

<header>
    <div>
        <h1>SCANIA <span>PRO</span></h1>
        <div style="color:var(--text-sec); font-size: 10px; text-transform: uppercase;">Stajkovci Sync Active</div>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="notify-btn" onclick="requestNotifyPermission()">🔔</button>
        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
    </div>
</header>

<div id="view-vehicles" class="view active">
    <div class="form-group">
        <label>Датум</label>
        <input type="date" id="bookingDate">
        <label>Клиент</label>
        <input type="text" id="clientInput" placeholder="Име на клиент...">
        <label>Регистрација</label>
        <input type="text" id="regInput" placeholder="SK-0000-AA" style="text-transform: uppercase;">
        <label>Опис на дефект</label>
        <textarea id="problemInput" placeholder="Што треба да се работи?"></textarea>
        <button class="btn btn-primary" onclick="addVehicle()">Внеси Возило</button>
    </div>
    <div style="padding: 10px 15px; font-size: 14px; font-weight: 700; color: var(--text-sec);">АКТИВНИ ВОЗИЛА:</div>
    <div id="vehicleList"></div>
</div>

<div id="view-tasks" class="view">
    <div class="form-group">
        <label>Нова задача</label>
        <input type="text" id="taskInput" placeholder="Додади обврска...">
        <button class="btn btn-primary" onclick="addTask()">Додади Задача</button>
    </div>
    <div id="taskList"></div>
</div>

<div id="view-export" class="view">
    <div class="form-group">
        <label>Избери датум за план</label>
        <input type="date" id="exportDate">
        <button class="btn" style="background:#5e5ce6; color:white; margin-top: 15px;" onclick="shareToViber()">📱 Сподели на Viber</button>
    </div>
    <div id="exportList"></div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="switchView('vehicles', this)">🚛<br>Возила</button>
    <button class="tab-item" onclick="switchView('tasks', this)">📋<br>Задачи</button>
    <button class="tab-item" onclick="switchView('export', this)">📤<br>Сподели</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIGd6wcTm6_Jjz1pDeI7KNyeF_vSqIMk0",
        authDomain: "scaniapro-e6fdf.firebaseapp.com",
        projectId: "scaniapro-e6fdf",
        storageBucket: "scaniapro-e6fdf.firebasestorage.app",
        messagingSenderId: "844311721409",
        appId: "1:844311721409:web:8288d3b0a7dc88d79eab40"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let vehicles = [];
    let tasks = [];
    let isInitialLoad = true;

    // --- НОТИФИКАЦИИ ---
    if ("Notification" in window) {
        if (Notification.permission !== "granted") {
            document.getElementById('notify-btn').style.display = 'flex';
        }
    }

    window.requestNotifyPermission = function() {
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                document.getElementById('notify-btn').style.display = 'none';
                new Notification("Scania Pro", { body: "Известувањата се успешно вклучени!", icon: 'Icon.jpg' });
            }
        });
    };

    function sendPush(t, b) {
        if (Notification.permission === "granted") {
            new Notification(t, { body: b, icon: 'Icon.jpg' });
        }
    }

    // --- REAL-TIME ПОДАТОЦИ ---
    onSnapshot(collection(db, "vehicles"), (snap) => {
        // Проверка за нови возила (за нотификација)
        snap.docChanges().forEach(change => {
            if (!isInitialLoad && change.type === "added") {
                sendPush("Ново возило!", change.doc.data().reg + " - " + change.doc.data().client);
            }
        });

        vehicles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        isInitialLoad = false;
        renderVehicles();
    });

    onSnapshot(collection(db, "tasks"), (snap) => {
        tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTasks();
    });

    // --- ФУНКЦИИ (Закачени на window за да работат од HTML) ---
    window.addVehicle = async () => {
        const date = document.getElementById('bookingDate').value;
        const client = document.getElementById('clientInput').value;
        const reg = document.getElementById('regInput').value.toUpperCase();
        const problem = document.getElementById('problemInput').value;
        if(!date || !client || !reg) return alert("Пополни ги задолжителните полиња!");

        await addDoc(collection(db, "vehicles"), { date, client, reg, problem, ts: Date.now() });
        document.getElementById('clientInput').value = '';
        document.getElementById('regInput').value = '';
        document.getElementById('problemInput').value = '';
    };

    window.removeVehicle = async (id) => { 
        if(confirm("Дали возилото е готово?")) await deleteDoc(doc(db, "vehicles", id)); 
    };

    window.addTask = async () => {
        const text = document.getElementById('taskInput').value;
        if(text) await addDoc(collection(db, "tasks"), { text, done: false, ts: Date.now() });
        document.getElementById('taskInput').value = '';
    };

    window.toggleTask = async (id, s) => await updateDoc(doc(db, "tasks", id), { done: !s });
    window.deleteTask = async (id) => await deleteDoc(doc(db, "tasks", id));

    // --- ПРИКАЗ ---
    function renderVehicles() {
        const list = document.getElementById('vehicleList');
        list.innerHTML = '';
        vehicles.sort((a,b) => new Date(a.date) - new Date(b.date) || a.ts - b.ts).forEach(v => {
            const d = v.date.split('-');
            list.innerHTML += `
                <div class="list-card">
                    <div class="card-header">
                        <div><strong>${v.reg}</strong><br><small style="color:var(--text-sec)">${v.client}</small></div>
                        <div class="date-badge">${d[2]}.${d[1]}</div>
                    </div>
                    <div class="problem-desc">${v.problem || 'Нема опис.'}</div>
                    <button class="btn-done" onclick="removeVehicle('${v.id}')">✓ ГОТОВО</button>
                    <div style="clear:both;"></div>
                </div>`;
        });
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '<div style="padding: 10px 15px; font-size: 14px; font-weight: 700; color: var(--text-sec);">ОБВРСКИ:</div>';
        tasks.sort((a,b) => a.ts - b.ts).forEach(t => {
            list.innerHTML += `
                <div class="list-card" style="display:flex; align-items:center; gap:10px; opacity:${t.done ? 0.5 : 1}">
                    <div style="flex:1; text-decoration:${t.done ? 'line-through' : 'none'}" onclick="toggleTask('${t.id}', ${t.done})">${t.text}</div>
                    <button style="border:none; background:none; color:var(--scania-red); font-size:18px;" onclick="deleteTask('${t.id}')">✕</button>
                </div>`;
        });
    }

    window.switchView = (id, btn) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-'+id).classList.add('active');
        btn.classList.add('active');
        if(id === 'export') renderExport();
    };

    function renderExport() {
        const selDate = document.getElementById('exportDate').value;
        const list = document.getElementById('exportList');
        const filtered = vehicles.filter(v => v.date === selDate);
        list.innerHTML = filtered.length ? '' : '<div style="text-align:center; padding:20px; color:gray">Нема возила за овој датум.</div>';
        filtered.forEach(v => {
            list.innerHTML += `<div class="list-card"><strong>${v.reg}</strong> - ${v.client}</div>`;
        });
    }

    window.shareToViber = () => {
        const selDate = document.getElementById('exportDate').value;
        const filtered = vehicles.filter(v => v.date === selDate);
        if(!filtered.length) return alert("Нема возила!");
        let txt = `*ПЛАН ЗА СЕРВИС (${selDate})*\n------------------\n`;
        filtered.forEach(v => txt += `🚛 *${v.reg}* - ${v.client}\n🔧 ${v.problem}\n\n`);
        if(navigator.share) navigator.share({ text: txt });
        else { navigator.clipboard.writeText(txt); alert("Планот е копиран!"); }
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const isL = document.body.classList.contains('light-mode');
        document.getElementById('themeBtn').innerText = isL ? '🌙' : '☀️';
        localStorage.setItem('sc_theme', isL ? 'light' : 'dark');
    };

    // Почетни вредности
    if(localStorage.getItem('sc_theme') === 'light') { document.body.classList.add('light-mode'); document.getElementById('themeBtn').innerText = '🌙'; }
    document.getElementById('bookingDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('exportDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
