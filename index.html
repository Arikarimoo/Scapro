<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scania Service Pro</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="Icon.jpg">
    <link rel="apple-touch-icon" href="Icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --red: #ff3b30; --bg: #000; --card: #1c1c1e; --txt: #fff; --sec: #8e8e93; --border: #38383a; --success: #34c759; }
        body.light-mode { --bg: #f2f2f7; --card: #fff; --red: #d6001c; --txt: #000; --sec: #6e6e73; --border: #c6c6c8; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--txt); padding-bottom: 120px; transition: 0.3s; }
        
        header { padding: 40px 15px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; background: var(--bg); z-index:100; }
        h1 span { color: var(--red); }

        .header-actions { display: flex; gap: 10px; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--txt); border-radius: 50%; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; }

        .form-group { background: var(--card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border); }
        label { display: block; font-size: 11px; color: var(--sec); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--txt); font-size: 16px; padding: 10px 0; margin-bottom: 15px; border-radius: 0; }
        input:focus { outline: none; border-bottom-color: var(--red); }

        .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--red); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .list-card { background: var(--card); margin: 0 15px 12px; border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
        .reg-plate { font-size: 19px; font-weight: 800; }
        .date-badge { color: var(--red); font-weight: bold; font-size: 13px; }
        .btn-done { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 6px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; float: right; margin-top: 5px; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0 40px; border-top: 1px solid var(--border); z-index: 1000; }
        .tab-item { color: var(--sec); background: none; border: none; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-item.active { color: var(--red); }

        .view { display: none; }
        .view.active { display: block; }

        #bell-btn { color: var(--red); border-color: var(--red); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; font-size:22px;">SCANIA <span>PRO</span></h1>
        <small id="status-text" style="color:gray">Поврзување...</small>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="bell-btn" onclick="requestPermission()">🔔</button>
        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
    </div>
</header>

<div id="view-vehicles" class="view active">
    <div class="form-group">
        <label>Датум</label>
        <input type="date" id="vDate">
        <label>Клиент</label>
        <input type="text" id="vClient" placeholder="Име на фирма...">
        <label>Регистрација</label>
        <input type="text" id="vReg" placeholder="SK-0000-AA" style="text-transform:uppercase">
        <label>Опис</label>
        <textarea id="vProb" placeholder="Што треба да се прави?"></textarea>
        <button class="btn-primary" onclick="addVehicle()">ВНЕСИ ВОЗИЛО</button>
    </div>
    <div id="vehicleList"></div>
</div>

<div id="view-tasks" class="view">
    <div class="form-group">
        <label>Нова задача</label>
        <input type="text" id="tInput" placeholder="Додади обврска...">
        <button class="btn-primary" onclick="addTask()">ДОДАДИ ЗАДАЧА</button>
    </div>
    <div id="taskList"></div>
</div>

<div id="view-export" class="view">
    <div class="form-group">
        <label>Избери датум за план</label>
        <input type="date" id="eDate">
        <button class="btn-primary" style="background:#5e5ce6; margin-top:10px;" onclick="shareToViber()">📱 СПОДЕЛИ НА VIBER</button>
    </div>
    <div id="exportList"></div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="switchView('vehicles', this)">🚛<br>Возила</button>
    <button class="tab-item" onclick="switchView('tasks', this)">📋<br>Задачи</button>
    <button class="tab-item" onclick="switchView('export', this)">📤<br>Сподели</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIGd6wcTm6_Jjz1pDeI7KNyeF_vSqIMk0",
        authDomain: "scaniapro-e6fdf.firebaseapp.com",
        projectId: "scaniapro-e6fdf",
        storageBucket: "scaniapro-e6fdf.firebasestorage.app",
        messagingSenderId: "844311721409",
        appId: "1:844311721409:web:8288d3b0a7dc88d79eab40"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let isInitialLoad = true;
    let vehicles = [];
    let tasks = [];

    // РЕГИСТРАЦИЈА НА SERVICE WORKER
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=3');
    }

    // НОТИФИКАЦИИ
    window.requestPermission = function() {
        Notification.requestPermission().then(p => {
            if (p === 'granted') {
                document.getElementById('bell-btn').style.display = 'none';
                sendPush("Scania Pro", "Известувањата се успешно активирани!");
            }
        });
    };

    async function sendPush(t, b) {
        if (Notification.permission === 'granted') {
            const reg = await navigator.serviceWorker.ready;
            reg.showNotification(t, {
                body: b,
                icon: 'Icon.jpg',
                badge: 'Icon.jpg',
                vibrate: [300, 100, 300],
                tag: 'scania-update',
                renotify: true
            });
        }
    }

    // REAL-TIME СЛУШАЧ ЗА ВОЗИЛА
    onSnapshot(query(collection(db, "vehicles"), orderBy("ts", "desc")), (snap) => {
        snap.docChanges().forEach(change => {
            if (!isInitialLoad && change.type === "added") {
                const v = change.doc.data();
                sendPush("Ново возило!", v.reg + " - " + v.client);
            }
        });
        vehicles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderVehicles();
        if(isInitialLoad) { 
            isInitialLoad = false; 
            document.getElementById('status-text').innerText = "ONLINE ✅ (" + snap.size + ")"; 
        }
    });

    // REAL-TIME СЛУШАЧ ЗА ЗАДАЧИ
    onSnapshot(query(collection(db, "tasks"), orderBy("ts", "desc")), (snap) => {
        tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTasks();
    });

    // ФУНКЦИИ
    window.addVehicle = async () => {
        const date = document.getElementById('vDate').value;
        const client = document.getElementById('vClient').value;
        const reg = document.getElementById('vReg').value.toUpperCase();
        const prob = document.getElementById('vProb').value;
        if(date && client && reg) {
            await addDoc(collection(db, "vehicles"), { date, client, reg, prob, ts: Date.now() });
            document.getElementById('vClient').value = ''; document.getElementById('vReg').value = ''; document.getElementById('vProb').value = '';
        }
    };

    window.removeVehicle = async (id) => { if(confirm("Завршено?")) await deleteDoc(doc(db, "vehicles", id)); };
    window.addTask = async () => {
        const text = document.getElementById('tInput').value;
        if(text) await addDoc(collection(db, "tasks"), { text, done: false, ts: Date.now() });
        document.getElementById('tInput').value = '';
    };
    window.toggleTask = async (id, s) => await updateDoc(doc(db, "tasks", id), { done: !s });
    window.deleteTask = async (id) => await deleteDoc(doc(db, "tasks", id));

    // ПРИКАЗ
    function renderVehicles() {
        const list = document.getElementById('vehicleList');
        list.innerHTML = '';
        let sorted = [...vehicles].sort((a,b) => new Date(a.date) - new Date(b.date));
        sorted.forEach(v => {
            const d = v.date.split('-');
            list.innerHTML += `
                <div class="list-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="reg-plate">${v.reg}</span>
                        <span class="date-badge">${d[2]}.${d[1]}</span>
                    </div>
                    <div style="color:var(--sec); font-size:14px; margin-top:4px;">${v.client}</div>
                    <div style="font-size:15px; margin-top:10px; background:rgba(120,120,128,0.1); padding:10px; border-radius:10px;">${v.prob || 'Нема опис'}</div>
                    <button class="btn-done" onclick="removeVehicle('${v.id}')">✓ ГОТОВО</button>
                    <div style="clear:both"></div>
                </div>`;
        });
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasks.forEach(t => {
            list.innerHTML += `
                <div class="list-card" style="display:flex; align-items:center; gap:10px; opacity:${t.done?0.5:1}">
                    <div style="flex:1; text-decoration:${t.done?'line-through':'none'}" onclick="toggleTask('${t.id}', ${t.done})">${t.text}</div>
                    <button style="border:none; background:none; color:var(--red); font-size:20px;" onclick="deleteTask('${t.id}')">✕</button>
                </div>`;
        });
    }

    window.switchView = (id, btn) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-'+id).classList.add('active');
        btn.classList.add('active');
    };

    window.shareToViber = () => {
        const selDate = document.getElementById('eDate').value;
        const filtered = vehicles.filter(v => v.date === selDate);
        if(!filtered.length) return alert("Нема возила за овој датум!");
        let txt = `*ПЛАН ЗА СЕРВИС (${selDate})*\n`;
        filtered.forEach(v => txt += `🚛 *${v.reg}* - ${v.client}\n🔧 ${v.prob}\n\n`);
        if(navigator.share) navigator.share({ text: txt });
        else { navigator.clipboard.writeText(txt); alert("Копирано!"); }
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const isL = document.body.classList.contains('light-mode');
        document.getElementById('themeBtn').innerText = isL ? '🌙' : '☀️';
    };

    document.getElementById('vDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('eDate').value = new Date().toISOString().split('T')[0];
    if (Notification.permission === "granted") document.getElementById('bell-btn').style.display = 'none';
</script>
</body>
</html>
