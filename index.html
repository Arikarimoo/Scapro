<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scania Service Pro</title>

    <link rel="icon" href="Icon.jpg">
    <link rel="apple-touch-icon" href="Icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-main: #000000;
            --bg-card: #1c1c1e;
            --scania-red: #ff3b30;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --border-color: #38383a;
            --success: #34c759;
            --nav-bg: rgba(28, 28, 30, 0.9);
        }

        body.light-mode {
            --bg-main: #f2f2f7;
            --bg-card: #ffffff;
            --scania-red: #d6001c;
            --text-main: #000000;
            --text-sec: #6e6e73;
            --border-color: #c6c6c8;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; background-color: var(--bg-main); color: var(--text-main);
            padding-bottom: 100px; transition: 0.3s;
        }

        header {
            padding: 20px 15px 10px; background: var(--bg-main); border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }

        h1 { margin: 0; font-size: 22px; font-weight: 700; }
        h1 span { color: var(--scania-red); }

        #notify-btn {
            background: var(--scania-red); color: white; padding: 12px; text-align: center;
            font-size: 13px; font-weight: 700; cursor: pointer; display: none;
        }

        .form-group {
            background: var(--bg-card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border-color);
        }

        label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; font-weight: 700; }

        input, textarea {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-color);
            color: var(--text-main); font-size: 16px; padding: 10px 0; margin-bottom: 15px;
        }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-primary { background-color: var(--scania-red); color: white; }

        .list-card {
            background: var(--bg-card); margin: 0 15px 12px; border-radius: 12px; padding: 16px; border: 1px solid var(--border-color);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .reg-plate { font-size: 18px; font-weight: 800; }
        .date-badge { color: var(--scania-red); font-weight: 700; }

        .btn-done { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 8px 15px; border-radius: 20px; font-size: 12px; float: right; margin-top: 5px; }

        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 15px 0 30px;
        }

        .tab-item { color: var(--text-sec); background: none; border: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .tab-item.active { color: var(--scania-red); }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<div id="notify-btn" onclick="requestNotifyPermission()">
   🔔 КЛИКНИ ТУКА ЗА ДА ГИ ВКЛУЧИШ ИЗВЕСТУВАЊАТА
</div>

<header>
    <div>
        <h1>SCANIA <span>PRO</span></h1>
        <div style="color:var(--text-sec); font-size: 10px;">STAJKOVCI SYNC ACTIVE</div>
    </div>
    <button onclick="toggleTheme()" style="background:none; border:none; font-size:20px;">☀️</button>
</header>

<div id="view-vehicles" class="view active">
    <div class="form-group">
        <label>Датум</label>
        <input type="date" id="bookingDate">
        <label>Клиент</label>
        <input type="text" id="clientInput" placeholder="Име...">
        <label>Регистрација</label>
        <input type="text" id="regInput" placeholder="SK-0000-AA" style="text-transform: uppercase;">
        <label>Проблем</label>
        <textarea id="problemInput" placeholder="Опис на дефект..."></textarea>
        <button class="btn btn-primary" onclick="addVehicle()">Внеси во систем</button>
    </div>
    <div id="vehicleList"></div>
</div>

<div id="view-tasks" class="view">
    <div class="form-group">
        <input type="text" id="taskInput" placeholder="Нова задача...">
        <button class="btn btn-primary" onclick="addTask()" style="margin-top:10px;">Додади</button>
    </div>
    <div id="taskList"></div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="switchView('vehicles')">🚛<br>Возила</button>
    <button class="tab-item" onclick="switchView('tasks')">📋<br>Задачи</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIGd6wcTm6_Jjz1pDeI7KNyeF_vSqIMk0",
        authDomain: "scaniapro-e6fdf.firebaseapp.com",
        projectId: "scaniapro-e6fdf",
        storageBucket: "scaniapro-e6fdf.firebasestorage.app",
        messagingSenderId: "844311721409",
        appId: "1:844311721409:web:8288d3b0a7dc88d79eab40"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let isInitialLoad = true;

    // Прикажи копче за нотификации ако не се дозволени
    if ("Notification" in window && Notification.permission !== "granted") {
        document.getElementById('notify-btn').style.display = 'block';
    }

    window.requestNotifyPermission = function() {
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                document.getElementById('notify-btn').style.display = 'none';
                new Notification("Scania Pro", { body: "Известувањата се активирани!" });
            }
        });
    };

    function sendPush(t, b) {
        if (Notification.permission === "granted") {
            new Notification(t, { body: b, icon: 'Icon.jpg' });
        }
    }

    // REAL-TIME СЛУШАЧ ЗА ВОЗИЛА
    onSnapshot(query(collection(db, "vehicles"), orderBy("ts", "desc")), (snap) => {
        const list = document.getElementById('vehicleList');
        list.innerHTML = '<div style="padding:15px; font-weight:700;">Активни камиони:</div>';
        
        snap.docChanges().forEach(change => {
            if (!isInitialLoad && change.type === "added") {
                sendPush("Ново возило!", change.doc.data().reg + " - " + change.doc.data().client);
            }
        });

        snap.forEach(doc => {
            const v = doc.data();
            const d = v.date.split('-');
            list.innerHTML += `
                <div class="list-card">
                    <div class="card-header">
                        <div><strong>${v.reg}</strong><br><small>${v.client}</small></div>
                        <div class="date-badge">${d[2]}.${d[1]}</div>
                    </div>
                    <div style="font-size:14px; margin:10px 0; background:rgba(0,0,0,0.05); padding:8px; border-radius:5px;">${v.problem}</div>
                    <button class="btn-done" onclick="removeVehicle('${doc.id}')">✓ ГОТОВО</button>
                    <div style="clear:both;"></div>
                </div>`;
        });
        isInitialLoad = false;
    });

    // REAL-TIME СЛУШАЧ ЗА ЗАДАЧИ
    onSnapshot(query(collection(db, "tasks"), orderBy("ts", "desc")), (snap) => {
        const list = document.getElementById('taskList');
        list.innerHTML = '<div style="padding:15px; font-weight:700;">Обврски:</div>';
        snap.forEach(doc => {
            const t = doc.data();
            list.innerHTML += `
                <div class="list-card" style="display:flex; align-items:center; opacity:${t.done?0.5:1}">
                    <div style="flex:1; text-decoration:${t.done?'line-through':'none'}" onclick="toggleTask('${doc.id}', ${t.done})">${t.text}</div>
                    <button style="border:none; background:none; color:red; font-size:18px;" onclick="deleteTask('${doc.id}')">✕</button>
                </div>`;
        });
    });

    window.addVehicle = async () => {
        const date = document.getElementById('bookingDate').value;
        const client = document.getElementById('clientInput').value;
        const reg = document.getElementById('regInput').value.toUpperCase();
        const problem = document.getElementById('problemInput').value;
        if(date && client && reg) {
            await addDoc(collection(db, "vehicles"), { date, client, reg, problem, ts: Date.now() });
            document.getElementById('clientInput').value = ''; document.getElementById('regInput').value = ''; document.getElementById('problemInput').value = '';
        }
    };

    window.removeVehicle = async (id) => { if(confirm("Завршено?")) await deleteDoc(doc(db, "vehicles", id)); };
    window.addTask = async () => {
        const text = document.getElementById('taskInput').value;
        if(text) await addDoc(collection(db, "tasks"), { text, done: false, ts: Date.now() });
        document.getElementById('taskInput').value = '';
    };
    window.toggleTask = async (id, s) => await updateDoc(doc(db, "tasks", id), { done: !s });
    window.deleteTask = async (id) => await deleteDoc(doc(db, "tasks", id));

    window.switchView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
    };

    document.getElementById('bookingDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
