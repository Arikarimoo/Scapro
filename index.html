<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scania Service Pro</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="Icon.jpg">
    <link rel="apple-touch-icon" href="Icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --bg: #000; --card: #1c1c1e; --red: #ff3b30; --txt: #fff; --sec: #8e8e93; --border: #38383a; --success: #34c759; }
        body.light-mode { --bg: #f2f2f7; --card: #fff; --red: #d6001c; --txt: #000; --sec: #6e6e73; --border: #c6c6c8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--txt); padding-bottom: 110px; transition: 0.3s; }
        header { padding: 20px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; background: var(--bg); z-index:10; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--txt); border-radius: 50%; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; }
        .form-group { background: var(--card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border); }
        input, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--txt); font-size: 16px; padding: 10px 0; margin-bottom: 15px; border-radius: 0; }
        .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--red); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .list-card { background: var(--card); margin: 0 15px 12px; border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); }
        .tab-item { color: var(--sec); background: none; border: none; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-item.active { color: var(--red); }
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; font-size:22px;">SCANIA <span style="color:var(--red)">PRO</span></h1>
        <small id="status" style="color:gray">Синхронизација...</small>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="icon-btn" id="bell" onclick="requestPermission()">🔔</button>
        <button class="icon-btn" onclick="toggleTheme()">☀️</button>
    </div>
</header>

<div id="view-vehicles" class="view active">
    <div class="form-group">
        <input type="date" id="vDate">
        <input type="text" id="vClient" placeholder="Клиент">
        <input type="text" id="vReg" placeholder="РЕГИСТРАЦИЈА" style="text-transform:uppercase">
        <textarea id="vProb" placeholder="Дефект..."></textarea>
        <button class="btn-primary" onclick="addVehicle()">ВНЕСИ ВОЗИЛО</button>
    </div>
    <div id="vehicleList"></div>
</div>

<div id="view-tasks" class="view">
    <div class="form-group">
        <input type="text" id="tInput" placeholder="Нова задача...">
        <button class="btn-primary" onclick="addTask()">ДОДАДИ ЗАДАЧА</button>
    </div>
    <div id="taskList"></div>
</div>

<div id="view-export" class="view">
    <div class="form-group">
        <input type="date" id="eDate">
        <button class="btn-primary" style="background:#5e5ce6; margin-top:10px;" onclick="shareToViber()">📱 СПОДЕЛИ НА VIBER</button>
    </div>
    <div id="exportList"></div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="switchView('vehicles', this)">🚛<br>Возила</button>
    <button class="tab-item" onclick="switchView('tasks', this)">📋<br>Задачи</button>
    <button class="tab-item" onclick="switchView('export', this)">📤<br>Сподели</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIGd6wcTm6_Jjz1pDeI7KNyeF_vSqIMk0",
        authDomain: "scaniapro-e6fdf.firebaseapp.com",
        projectId: "scaniapro-e6fdf",
        storageBucket: "scaniapro-e6fdf.firebasestorage.app",
        messagingSenderId: "844311721409",
        appId: "1:844311721409:web:8288d3b0a7dc88d79eab40"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let isInitial = true;
    let vehicles = [];
    let tasks = [];

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=2');
    }

    window.requestPermission = function() {
        Notification.requestPermission().then(p => {
            if(p === 'granted') {
                document.getElementById('bell').style.display = 'none';
                sendPush("Scania Pro", "Известувањата се активни!");
            }
        });
    };

    async function sendPush(t, b) {
        try {
            const reg = await navigator.serviceWorker.ready;
            reg.showNotification(t, { body: b, icon: 'Icon.jpg', badge: 'Icon.jpg', vibrate: [200, 100, 200] });
        } catch (e) { console.error(e); }
    }

    onSnapshot(query(collection(db, "vehicles"), orderBy("ts", "desc")), (snap) => {
        snap.docChanges().forEach(change => {
            if (!isInitial && change.type === "added") {
                sendPush("Ново возило!", change.doc.data().reg + " - " + change.doc.data().client);
            }
        });
        vehicles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderVehicles();
        if(isInitial) { isInitial = false; document.getElementById('status').innerText = "ONLINE ✅"; }
    });

    onSnapshot(collection(db, "tasks"), (snap) => {
        tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTasks();
    });

    window.addVehicle = async () => {
        const date = document.getElementById('vDate').value;
        const client = document.getElementById('vClient').value;
        const reg = document.getElementById('vReg').value.toUpperCase();
        const prob = document.getElementById('vProb').value;
        if(reg && client) {
            await addDoc(collection(db, "vehicles"), { date, client, reg, prob, ts: Date.now() });
            document.getElementById('vClient').value = ''; document.getElementById('vReg').value = ''; document.getElementById('vProb').value = '';
        }
    };

    window.removeVehicle = async (id) => { if(confirm("Завршено?")) await deleteDoc(doc(db, "vehicles", id)); };
    window.addTask = async () => {
        const text = document.getElementById('tInput').value;
        if(text) await addDoc(collection(db, "tasks"), { text, done: false, ts: Date.now() });
        document.getElementById('tInput').value = '';
    };
    window.toggleTask = async (id, s) => await updateDoc(doc(db, "tasks", id), { done: !s });
    window.deleteTask = async (id) => await deleteDoc(doc(db, "tasks", id));

    window.renderVehicles = function() {
        const list = document.getElementById('vehicleList');
        list.innerHTML = '';
        vehicles.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(v => {
            list.innerHTML += `<div class="list-card">
                <strong>${v.reg}</strong> - <small>${v.client}</small><br>
                <div style="font-size:14px; margin-top:5px;">${v.prob}</div>
                <button style="float:right; color:#34c759; background:none; border:1px solid #34c759; border-radius:10px; padding:4px 8px;" onclick="removeVehicle('${v.id}')">✓ ГОТОВО</button>
                <div style="clear:both"></div>
            </div>`;
        });
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasks.forEach(t => {
            list.innerHTML += `<div class="list-card" style="display:flex; align-items:center; opacity:${t.done?0.5:1}">
                <div style="flex:1; text-decoration:${t.done?'line-through':'none'}" onclick="toggleTask('${t.id}', ${t.done})">${t.text}</div>
                <button style="border:none; background:none; color:var(--red); font-size:20px;" onclick="deleteTask('${t.id}')">✕</button>
            </div>`;
        });
    }

    window.switchView = (id, btn) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-'+id).classList.add('active');
        btn.classList.add('active');
    };

    window.shareToViber = () => {
        const selDate = document.getElementById('eDate').value;
        const filtered = vehicles.filter(v => v.date === selDate);
        let txt = `*ПЛАН SCANIA ЗА ${selDate}*\n`;
        filtered.forEach(v => txt += `🚛 ${v.reg} - ${v.client}\n`);
        if(navigator.share) navigator.share({ text: txt });
        else alert("Копирано!");
    };

    window.toggleTheme = () => document.body.classList.toggle('light-mode');
    document.getElementById('vDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('eDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
