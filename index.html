<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scania Pro Test</title>
    <link rel="icon" href="Icon.jpg">
    <link rel="apple-touch-icon" href="Icon.jpg">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --red: #ff3b30; --txt: #fff; --border: #38383a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 100px; }
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--red); color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .list-card { background: var(--card); margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #1c1c1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .tab { color: #8e8e93; background: none; border: none; font-size: 12px; }
        .tab.active { color: var(--red); }
        #test-btn { background: #5e5ce6; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>SCANIA <span>PRO</span></h1>
    <button onclick="requestPermission()" id="bell" style="background:none; border:none; font-size:24px;">🔔</button>
</header>

<div style="padding: 15px;">
    <button class="btn" id="test-btn" onclick="manualTest()">🧪 ТЕСТИРАЈ НОТИФИКАЦИЈА (КЛИКНИ ТУКА)</button>
    
    <div style="background: #2c2c2e; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px;">
        <strong>Статус:</strong> <span id="status">Проверувам...</span>
    </div>

    <div style="background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
        <label style="display:block; font-size:11px; color:#8e8e93; margin-bottom:5px;">РЕГИСТРАЦИЈА</label>
        <input type="text" id="reg" style="width:100%; background:none; border:none; border-bottom:1px solid #38383a; color:#fff; font-size:18px; padding:5px 0; margin-bottom:15px;" placeholder="SK-0000-AA">
        <label style="display:block; font-size:11px; color:#8e8e93; margin-bottom:5px;">КЛИЕНТ</label>
        <input type="text" id="client" style="width:100%; background:none; border:none; border-bottom:1px solid #38383a; color:#fff; font-size:18px; padding:5px 0; margin-bottom:15px;" placeholder="Име...">
        <button class="btn" onclick="addVehicle()">ВНЕСИ ВОЗИЛО</button>
    </div>
</div>

<div id="list"></div>

<nav class="tab-bar">
    <button class="tab active">🚛 Возила</button>
    <button class="tab">📋 Задачи</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIGd6wcTm6_Jjz1pDeI7KNyeF_vSqIMk0",
        authDomain: "scaniapro-e6fdf.firebaseapp.com",
        projectId: "scaniapro-e6fdf",
        storageBucket: "scaniapro-e6fdf.firebasestorage.app",
        messagingSenderId: "844311721409",
        appId: "1:844311721409:web:8288d3b0a7dc88d79eab40"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let isInitial = true;

    // СТАТУС ПРОВЕРКА
    const statusEl = document.getElementById('status');
    if (!("Notification" in window)) {
        statusEl.innerText = "Овој прелистувач НЕ поддржува нотификации.";
    } else {
        statusEl.innerText = "Дозвола: " + Notification.permission;
    }

    window.requestPermission = function() {
        Notification.requestPermission().then(p => {
            statusEl.innerText = "Дозвола: " + p;
            if(p === 'granted') new Notification("Успешно!", { body: "Нотификациите се вклучени." });
        });
    };

    window.manualTest = function() {
        if(Notification.permission === 'granted') {
            new Notification("Тест Порака", { body: "Ова е рачен тест. Ако го гледаш ова, кодот работи!", icon: 'Icon.jpg' });
        } else {
            alert("Прво кликни на 🔔 за да дозволиш нотификации!");
        }
    };

    // REAL-TIME СЛУШАЧ (Ова МОРА да работи без рефреш)
    onSnapshot(query(collection(db, "vehicles"), orderBy("ts", "desc")), (snap) => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        
        snap.docChanges().forEach(change => {
            if (!isInitial && change.type === "added") {
                const data = change.doc.data();
                if(Notification.permission === 'granted') {
                    new Notification("Ново возило!", { body: data.reg + " - " + data.client });
                }
            }
        });

        snap.forEach(doc => {
            const v = doc.data();
            list.innerHTML += `<div class="list-card"><strong>${v.reg}</strong><br><small>${v.client}</small></div>`;
        });
        isInitial = false;
    });

    window.addVehicle = async () => {
        const reg = document.getElementById('reg').value;
        const client = document.getElementById('client').value;
        if(reg && client) {
            await addDoc(collection(db, "vehicles"), { reg, client, ts: Date.now() });
            document.getElementById('reg').value = '';
            document.getElementById('client').value = '';
        }
    };
</script>
</body>
</html>
